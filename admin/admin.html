<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel administrador</title>
  <link rel="stylesheet" href="admin.css">
</head>
<body>
  <main class="admin-wrap">
    <h1>Panel administrador</h1>

    <form id="productoForm" class="admin-form" enctype="multipart/form-data">
      <input type="hidden" id="productoId">

      <input type="text" id="nombre" placeholder="Nombre del producto" required>
      <input type="number" id="precio" placeholder="Precio" required>

      <textarea id="descripcion" placeholder="Descripción"></textarea>

      <div class="field-group">
        <label for="categoria">Categoría</label>
        <select id="categoria" required>
          <option value="">Seleccionar categoría</option>
          <option value="partes-de-arriba">Partes de arriba</option>
          <option value="partes-de-abajo">Partes de abajo</option>
          <option value="linea-deportiva">Línea deportiva</option>
          <option value="calzados">Calzados</option>
          <option value="accesorios">Accesorios</option>
          <option value="ofertas-imperdibles">Ofertas imperdibles</option>
        </select>
      </div>

      <div class="field-group">
        <label for="subcategoria">Subcategoría</label>
        <select id="subcategoria" required>
          <option value="">Seleccionar subcategoría</option>
        </select>
      </div>

      <input type="text" id="talles" placeholder="Talles ej: S, M, L">
      <input type="text" id="colores" placeholder="Colores ej: Blanco, Rosa, Negro">
      <input type="number" id="stock" placeholder="Stock" min="0">
      <input type="file" id="imagen" accept="image/*">

      <button type="submit" id="submitBtn">Guardar producto</button>
    </form>

    <section>
      <h2>Productos cargados</h2>
      <div id="listaProductos" class="admin-list"></div>
    </section>
  </main>

 <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="admin.js"></script>
</body>
</html>
